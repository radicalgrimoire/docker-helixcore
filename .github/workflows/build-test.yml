name: build-test

run-name: >
  Build Test: ${{ inputs.dockerfile || 'Dockerfile' }} 
  (${{ github.event_name }})
  by @${{ github.actor }}

on:
  push:
    branches-ignore:
      - 'main'
    paths:
      - 'build/**'
      - '.github/workflows/build-test.yml'
  
  workflow_dispatch:
    inputs:
      dockerfile:
        description: 'Dockerfile to use for building'
        required: false
        default: 'Dockerfile'
        type: string


jobs:
  build-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Display test information
        run: |
          echo "=== Build Test Information ==="
          echo "Event: ${{ github.event_name }}"
          echo "Dockerfile: ${{ inputs.dockerfile || 'Dockerfile' }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo ""

      - name: Build image
        run: |
          DOCKERFILE_NAME="${{ inputs.dockerfile || 'Dockerfile' }}"
          echo "Building Docker image with $DOCKERFILE_NAME..."
          bash ./build/docker-build.sh "$DOCKERFILE_NAME" ./build
        env:
          P4USER: ${{ secrets.P4USER || 'defaultuser' }}
          P4PASSWD: ${{ secrets.P4PASSWD || 'defaultpass' }}
          IMAGE_NAME: ${{ secrets.IMAGE_NAME || 'helix-p4d-test' }}

      - name: Test basic functionality
        run: |
          echo "=== Basic Functionality Test ==="
          
          # P4D help command test
          echo "Testing P4D help command..."
          if docker run --rm ${{ secrets.IMAGE_NAME }} p4d -h > /dev/null 2>&1; then
            echo "P4D help command: success"
          else
            echo "P4D help command: failed"
              exit 1
          fi
          
          # P4D version retrieval test
          echo "Testing P4D version retrieval..."
            P4D_VERSION=$(docker run --rm ${{ secrets.IMAGE_NAME }} p4d -V 2>&1 || true)
            if echo "$P4D_VERSION" | grep -q '^Rev\.'; then
            echo "P4D version retrieval: success"
            echo "   Version info: $(echo "$P4D_VERSION" | head -1)"
          else
            echo "P4D version retrieval: failed"
              echo "=== p4d -V output ==="
              echo "$P4D_VERSION"
              exit 1
          fi
          
          # Package verification test
          echo "Checking required packages..."
          if docker run --rm ${{ secrets.IMAGE_NAME }} dpkg -l | grep -E "(helix|perforce)" > /dev/null 2>&1; then
            echo "Perforce packages: installed"
              docker run --rm ${{ secrets.IMAGE_NAME }} dpkg -l | grep -E "(helix|perforce)" | head -3
          else
            echo "Perforce packages: not found (possibly custom build)"
          fi

      - name: Run Helix P4D integration tests
        run: |
          echo "=== Helix P4D Integration Test ==="
          
          # Create network for tests
          docker network create p4test-network || true
          
          # P4D server startup test (background)
          echo "Testing P4D server startup..."
          docker run -d \
              --name p4d-integration-test \
              --network p4test-network \
              -e P4PORT=ssl:1666 \
              -e P4USER=${{ secrets.P4USER || 'testuser' }} \
              -e P4PASSWD=${{ secrets.P4PASSWD || 'testpass' }} \
              ${{ secrets.IMAGE_NAME }} || {
            echo "P4D server startup: failed"
              exit 1
          }
          
          # Wait for server startup
          echo "Waiting for server startup..."
          for i in {1..60}; do
            # Check P4D server process
              if docker exec p4d-integration-test pgrep p4d > /dev/null 2>&1; then
              # Trust SSL cert before running P4 command test
                  if docker exec p4d-integration-test sh -c 'p4 trust -y -f 2>/dev/null && p4 info -s' > /dev/null 2>&1; then
                echo "P4D server startup: success (after ${i}s)"
                      break
                  fi
              fi
              if [ $i -eq 60 ]; then
              echo "P4D server startup: timeout"
              echo "=== Container logs ==="
                  docker logs p4d-integration-test
              echo "=== Process status ==="
                  docker exec p4d-integration-test ps aux || true
                  exit 1
              fi
              sleep 1
          done
          
          # Basic P4 command tests
          echo "Running basic P4 command tests..."
          
          # p4 info test
          if docker exec p4d-integration-test p4 info -s > /dev/null 2>&1; then
            echo "p4 info: success"
            # Show server info
            echo "   Server info:"
              docker exec p4d-integration-test p4 info | head -5 | sed 's/^/     /'
          else
            echo "p4 info: failed"
            echo "=== Debug information ==="
              docker exec p4d-integration-test p4 info || true
            echo "=== Container logs ==="
              docker logs p4d-integration-test | tail -20
              exit 1
          fi
          
          # p4 users test
          if docker exec p4d-integration-test p4 users > /dev/null 2>&1; then
            echo "p4 users: success"
              USER_COUNT=$(docker exec p4d-integration-test p4 users | wc -l)
            echo "   Registered users: ${USER_COUNT}"
          else
            echo "p4 users: failed"
            echo "=== Debug information ==="
              docker exec p4d-integration-test p4 users || true
            echo "=== Container logs ==="
              docker logs p4d-integration-test | tail -20
              exit 1
          fi
          
          echo "Helix P4D integration test completed"

      - name: Cleanup integration test environment
        if: always()
        run: |
          echo "Cleaning up integration test environment..."
          docker rm -f p4d-integration-test || true
          docker network rm p4test-network || true
          echo "Cleanup completed"

      - name: Check image size
        run: |
          echo "=== Docker Image Size Information ==="
          docker images ${{ secrets.IMAGE_NAME }} --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}\t{{.CreatedAt}}"
          echo ""
          
          # Detailed size information
          IMAGE_SIZE=$(docker images ${{ secrets.IMAGE_NAME }} --format "{{.Size}}")
          echo "Image Size: $IMAGE_SIZE"
          
          # Compressed size (close to actual transfer size)
          echo "Calculating compressed size..."
          docker save ${{ secrets.IMAGE_NAME }} | gzip | wc -c | awk '{printf "Compressed size: %.2f MB\n", $1/1024/1024}'
          
          # Layer information
          echo ""
          echo "Image layers:"
          docker history ${{ secrets.IMAGE_NAME }} --format "table {{.Size}}\t{{.CreatedBy}}" | head -10

      - name: Test summary
        if: always()
        run: |
          echo "=== Build test completed ==="
          echo "Docker image build succeeded"
          echo "Basic functionality tests completed"
          echo "Dockerfile used: ${{ inputs.dockerfile || 'Dockerfile' }}"
          
          # Show final size info in summary
          IMAGE_SIZE=$(docker images ${{ secrets.IMAGE_NAME }} --format "{{.Size}}")
          echo "Final image size: $IMAGE_SIZE"
          
          # Output results to GitHub Step Summary
          echo "## Build Test Result Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Execution Info" >> $GITHUB_STEP_SUMMARY
          echo "- **Dockerfile**: \`${{ inputs.dockerfile || 'Dockerfile' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Name**: \`${{ secrets.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Size**: $IMAGE_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- **Executed At**: $(date '+%Y-%m-%d %H:%M:%S JST')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Items" >> $GITHUB_STEP_SUMMARY
          echo "- [x] Docker image build" >> $GITHUB_STEP_SUMMARY
          echo "- [x] Basic functionality test (p4d command)" >> $GITHUB_STEP_SUMMARY
          echo "- [x] Version retrieval test" >> $GITHUB_STEP_SUMMARY
          echo "- [x] Package verification test" >> $GITHUB_STEP_SUMMARY
          echo "- [x] Image size optimization check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Note: This is a build test only. Image save/publish is not performed._" >> $GITHUB_STEP_SUMMARY
          
          echo ""
          echo "Note: This is a build test only. Image save/publish is not performed."